<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About & Contact | ToneVault</title>
    <!-- Basic SEO -->
    <meta name="description" content="Connect with Harish Cousal at ToneVault. Reach out for custom production inquiries, collaborations, and project rates.">
    <meta name="keywords" content="contact ToneVault, Harish Cousal email, hire Harish Cousal, music producer contact">

    <!-- Social Media Sharing (Open Graph) -->
    <meta property="og:title" content="About & Contact | ToneVault">
    <meta property="og:description" content="Get in touch with Harish Cousal for production inquiries and collaborations.">
    <!-- Updated to new domain -->
    <meta property="og:image" content="https://tonevault.qd.je/Images/BackGround.jpg">
    <meta property="og:url" content="https://tonevault.qd.je/Pages/About & Contact.html">
    <meta name="twitter:card" content="summary_large_image">
    <style>
        /* Base Styling & Global Parallax Background */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #f0f0f0;
            scroll-behavior: smooth; 
            overflow-x: hidden; 
            /* Updated path to point to Images folder in root */
            background-image: linear-gradient(rgba(10, 10, 10, 0.7), rgba(10, 10, 10, 0.9)), url('../Images/BackGround.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed; 
        }
        
        a { text-decoration: none; color: #00d4ff; transition: color 0.3s; }
        a:hover { color: #ffffff; }

        /* Navigation Bar */
        header {
            position: fixed;
            top: 20px; 
            left: 50%;
            transform: translateX(-50%); 
            width: 98%; 
            background-color: rgba(20, 20, 20, 0.3); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 50px; 
            z-index: 1000;
            padding: 15px 40px; 
            box-sizing: border-box;
        }

        .nav-container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #fff; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: #00d4ff; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 40px; }
        nav ul li a { color: #fff; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        nav ul li a:hover { color: #00d4ff; }

        /* Rest of the styling (Glass panels, forms, etc.) remains unchanged */
        .glass-panel { max-width: 1000px; margin: 0 auto; background-color: rgba(15, 15, 15, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.07); border-radius: 24px; padding: 60px 40px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        .split-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 1200px; margin: 0 auto; align-items: start; }
        .form-group { margin-bottom: 20px; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px; background-color: rgba(5, 5, 5, 0.6); border: 1px solid #333; border-radius: 8px; color: #fff; }
        .btn-primary { background-color: #00d4ff; color: #000; border: none; padding: 15px 35px; border-radius: 3px; cursor: pointer; }
        footer { background-color: rgba(5, 5, 5, 0.95); padding: 40px 20px; text-align: center; }
    </style>
</head>
<body>

    <!-- NAVIGATION HEADER -->
    <header>
        <div class="nav-container">
            <!-- Points to index.html in root -->
            <a href="../index.html" class="logo">Tone<span>Vault</span></a>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="Listen.html">Listen</a></li>
                    <li><a href="Services.html">Services</a></li>
                    <li><a href="About & Contact.html">About & Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main style="padding: 180px 20px 80px 20px; min-height: 65vh; text-align: center;">
        <div class="page-header" style="margin-bottom: 60px;">
            <h1 style="font-size: 3rem; text-transform: uppercase; color: #fff;">Connect with the <span style="color: #00d4ff;">Vault</span></h1>
        </div>

        <div class="split-layout">
            <div class="glass-panel">
                <h2>The Producer</h2>
                <h3 style="color: #00d4ff;">Harish Cousal</h3>
                <p>ToneVault is the creative engine of Harish Cousal.</p>
            </div>

            <div class="glass-panel">
                <h2>Drop a Message</h2>
                <form id="contact-form" action="https://formsubmit.co/ajax/tonevaultbyhc@gmail.com" method="POST">
                    <input type="hidden" name="_captcha" value="false">
                    <div class="form-group"><input type="text" name="name" placeholder="Name" required></div>
                    <div class="form-group"><input type="email" name="email" placeholder="Email" required></div>
                    <div class="form-group"><textarea name="message" placeholder="Message" required></textarea></div>
                    <button type="submit" class="btn-primary">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ToneVault by HC. All rights reserved.</p>
    </footer>
</body>
</html>
